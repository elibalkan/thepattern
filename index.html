<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Pattern</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <h1>The Pattern</h1>
<div class="titleRule"></div>

    <div id="stageLabel" class="stageLabel"></div>

    <div id="sequence" class="sequence"></div>

    <form id="guessForm" class="controls" autocomplete="off">
      <input
        id="guessInput"
        class="input"
        type="text"
        inputmode="numeric"
        placeholder="Enter the next number"
      />
      <button class="btn" type="submit">Submit</button>
    </form>

    <p id="feedback" class="feedback"></p>

    <!-- Shows ONLY after all 3 rounds -->
    <section id="results" class="results hidden">
      <h2 class="resultsTitle">Results</h2>
      <div id="resultsGrid" class="resultsGrid"></div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
